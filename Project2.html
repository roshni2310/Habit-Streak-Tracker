<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Streak Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1000px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:25px;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:2.5rem;
}

.header p{
    opacity:0.8;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,0.15);
    border-radius:18px;
    padding:20px;
    text-align:center;
}

.card h2{
    font-size:2rem;
    margin-top:8px;
}

.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.calendar-header button{
    border:none;
    background:white;
    color:#2575fc;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.day-name{
    text-align:center;
    font-weight:bold;
    padding:10px;
}

.day{
    background:rgba(255,255,255,0.12);
    min-height:90px;
    border-radius:15px;
    padding:8px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    transition:0.3s;
}

.day:hover{
    transform:translateY(-4px);
}

.day.completed{
    background:linear-gradient(135deg,#00c853,#69f0ae);
    color:#fff;
}

.day-number{
    font-weight:bold;
}

.check{
    transform:scale(1.3);
    cursor:pointer;
    align-self:flex-end;
}

.today{
    border:2px solid #fff;
}

.streak-banner{
    text-align:center;
    margin:20px 0;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.15);
    font-size:1.2rem;
    font-weight:bold;
}

.fire{
    animation:fire 1s infinite alternate;
}

@keyframes fire{
    from{transform:scale(1);}
    to{transform:scale(1.15);}
}

@media(max-width:600px){
    .day{
        min-height:70px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🔥 Habit Streak Tracker</h1>
        <p>Stay consistent. Build unstoppable habits.</p>
    </div>

    <div class="stats">
        <div class="card">
            <div>🔥 Current Streak</div>
            <h2 id="streak">0</h2>
        </div>

        <div class="card">
            <div>🏆 Best Streak</div>
            <h2 id="best">0</h2>
        </div>

        <div class="card">
            <div>✅ Completed Days</div>
            <h2 id="completed">0</h2>
        </div>
    </div>

    <div class="streak-banner">
        <span class="fire">🔥</span>
        Keep the streak alive!
    </div>

    <div class="calendar-header">
        <button onclick="changeMonth(-1)">◀</button>
        <h2 id="monthYear"></h2>
        <button onclick="changeMonth(1)">▶</button>
    </div>

    <div class="calendar" id="calendar"></div>

</div>

<script>
let currentDate = new Date();

const habitData =
JSON.parse(localStorage.getItem("habitData")) || {};

function formatDate(date){
    return date.toISOString().split("T")[0];
}

function renderCalendar(){

    const calendar=document.getElementById("calendar");
    calendar.innerHTML="";

    const year=currentDate.getFullYear();
    const month=currentDate.getMonth();

    document.getElementById("monthYear").textContent =
    currentDate.toLocaleString('default',{
        month:'long',
        year:'numeric'
    });

    const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    dayNames.forEach(day=>{
        const div=document.createElement("div");
        div.className="day-name";
        div.textContent=day;
        calendar.appendChild(div);
    });

    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();

    for(let i=0;i<firstDay;i++){
        calendar.appendChild(document.createElement("div"));
    }

    const todayStr=formatDate(new Date());

    for(let day=1;day<=daysInMonth;day++){

        const dateObj=new Date(year,month,day);
        const dateKey=formatDate(dateObj);

        const cell=document.createElement("div");
        cell.className="day";

        if(dateKey===todayStr){
            cell.classList.add("today");
        }

        if(habitData[dateKey]){
            cell.classList.add("completed");
        }

        cell.innerHTML=`
            <div class="day-number">${day}</div>
            <input type="checkbox"
            class="check"
            ${habitData[dateKey] ? "checked" : ""}>
        `;

        const checkbox=cell.querySelector(".check");

        checkbox.addEventListener("change",()=>{

            if(checkbox.checked){
                habitData[dateKey]=true;
            }else{
                delete habitData[dateKey];
            }

            localStorage.setItem(
                "habitData",
                JSON.stringify(habitData)
            );

            renderCalendar();
            updateStats();
        });

        calendar.appendChild(cell);
    }
}

function calculateStreak(){

    let streak=0;

    const today=new Date();
    today.setHours(0,0,0,0);

    let checkDate=new Date(today);

    while(true){

        const key=formatDate(checkDate);

        if(habitData[key]){
            streak++;
        }else{
            break;
        }

        checkDate.setDate(checkDate.getDate()-1);
    }

    return streak;
}

function calculateBestStreak(){

    const dates=Object.keys(habitData).sort();

    let best=0;
    let current=0;

    for(let i=0;i<dates.length;i++){

        if(i===0){
            current=1;
        }else{

            const prev=new Date(dates[i-1]);
            const curr=new Date(dates[i]);

            const diff=
            (curr-prev)/(1000*60*60*24);

            if(diff===1){
                current++;
            }else{
                current=1;
            }
        }

        best=Math.max(best,current);
    }

    return best;
}

function updateStats(){

    const streak=calculateStreak();
    const best=calculateBestStreak();
    const completed=Object.keys(habitData).length;

    document.getElementById("streak").textContent=streak;
    document.getElementById("best").textContent=best;
    document.getElementById("completed").textContent=completed;
}

function changeMonth(step){
    currentDate.setMonth(currentDate.getMonth()+step);
    renderCalendar();
}

renderCalendar();
updateStats();
</script>

</body>
</html>
